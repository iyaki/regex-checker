assert_lefthook_installed: true

no_tty: true

output:
  - failure

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  setup:
    # Format files
    - run: bash scripts/quality.sh gofmt
      stage_fixed: true
  jobs:
    - name: test-coverage
      run: bash scripts/quality.sh coverage
      glob: "*.go"
    - name: mutation-testing
      run: bash scripts/quality.sh mutation HEAD
      glob: "*.go"
    - name: golangci-lint
      run: bash scripts/quality.sh golangci
      glob: "*.go"
    - name: govulncheck
      run: bash scripts/quality.sh govulncheck
      glob: "*.go"
    - name: gosec
      run: bash scripts/quality.sh gosec
      glob: "*.go"
    - name: go-arch-lint
      run: bash scripts/quality.sh go-arch-lint
      glob: "*.go"
